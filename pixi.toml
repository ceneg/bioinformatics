[workspace]
name = "vaje"
version = "2026.1.0"
description = "Practical Genomics Workflows — Undergraduate Course Environment"
channels = ["https://packages.qiime2.org/qiime2/2026.4/qiime2/released", "conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64"]

[dependencies]
python = "3.11.*"

# --- SESSION 1: De Novo Assembly & Gene Prediction ---
[feature.genomika.dependencies]
fastp = "*"
spades = "3.15.*"
quast = "*"
augustus = "3.5.*"
biopython = "1.83.*"

# --- SESSION 2: Transcript Quantification & DGE ---
[feature.transkriptomika.dependencies]
salmon = "1.10.*"
r-base = "4.3.*"
bioconductor-tximport = "1.28.*"
bioconductor-deseq2 = "1.40.*"
bioconductor-biocparallel = "*"
bioconductor-genomeinfodbdata = "*"
r-ggplot2 = "3.4.*"
r-ggrepel = "0.9.*"
r-pheatmap = "1.0.*"
r-readr = "*"
r-dplyr = "*"
r-tibble = "*"
r-rcolorbrewer = "*"

# --- SESSION 3: Read Mapping & Variant Calling ---
[feature.polimorfizmi1.dependencies]
bwa = "0.7.*"
samtools = "1.19.*"
bcftools = "1.19.*"
vcftools = "*"

# --- SESSION 4: Population Genetics ---
[feature.polimorfizmi2.dependencies]
r-base = "4.3.*"
r-vcfr = "1.15.*"
r-poppr = "2.9.*"
r-ggplot2 = "3.4.*"
r-adegenet = "2.1.*"
r-hierfstat = "*"
r-ape = "5.7.*"
r-magrittr = "*"

# --- SESSION 5: 16S Amplicon & Microbiome Diversity ---
[feature.diverziteta.dependencies]
python = "3.11.*"
r-base = "4.3.*"

[feature.qiime2.dependencies]
python = "3.12.*"
qiime2 = "*"
q2cli = "*"
q2-types = "*"
q2-demux = "*"
q2-diversity = "*"
q2-feature-classifier = "*"
q2-taxa = "*"
q2-alignment = "*"
q2-phylogeny = "*"
q2-dada2 = "*"
biopython = "*"

[environments]
genomika = ["genomika"]
transkriptomika = ["transkriptomika"]
polimorfizmi = ["polimorfizmi1", "polimorfizmi2"]
diverziteta = ["diverziteta"]
qiime2 = { features = ["qiime2"], no-default-feature = true }

[tasks]
test = "bash tests/test_env.sh"
test-extended = "bash tests/test_extended.sh"
